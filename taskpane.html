<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teach</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
      background: #faf9f8;
      color: #242424;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    .header svg { flex-shrink:0; }
    .header h1 { font-size:16px; font-weight:600; color:#6264a7; }
    .header .badge {
      margin-left: auto;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #e8ebfa;
      color: #6264a7;
      font-weight: 600;
    }

    /* ── Login overlay ── */
    #loginOverlay {
      position: absolute; inset:0; z-index:100;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    #loginOverlay.hidden { display:none; }
    #loginOverlay h2 { font-size:20px; font-weight:600; color:#242424; }
    #loginOverlay p  { font-size:13px; color:#616161; max-width:280px; }
    #loginOverlay input {
      width: 100%; max-width:280px;
      padding: 8px 12px;
      border: 1px solid #d1d1d1;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
    }
    #loginOverlay input:focus { outline:none; border-color:#6264a7; }
    .login-btn {
      width: 100%; max-width:280px;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .login-btn.primary { background:#6264a7; color:#fff; }
    .login-btn.primary:hover { background:#4f52b5; }
    .login-btn.secondary { background:#f5f5f5; color:#242424; border:1px solid #d1d1d1; }
    .login-btn.secondary:hover { background:#e8e8e8; }
    .login-divider { font-size:12px; color:#999; }
    .user-info { font-size:12px; color:#107c10; }

    /* ── Teach iframe ── */
    #teachFrame {
      flex: 1;
      width: 100%;
      border: none;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    .bottom-bar button {
      flex: 1;
      padding: 8px 4px;
      border: 1px solid #d1d1d1;
      border-radius: 4px;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .bottom-bar button:hover { background:#f5f5f5; }
    .bottom-bar button.primary {
      background: #6264a7;
      color: #fff;
      border-color: #6264a7;
    }
    .bottom-bar button.primary:hover { background:#4f52b5; }

    /* ── Status toast ── */
    .toast {
      position: fixed;
      bottom: 56px;
      left: 10px; right: 10px;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      z-index: 200;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
    }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.success { background:#dff6dd; color:#107c10; border:1px solid #9ee09e; }
    .toast.error   { background:#fde7e9; color:#a4262c; border:1px solid #eeacb2; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <rect width="24" height="24" rx="4" fill="#6264a7"/>
      <path d="M7 8h10M7 12h7M7 16h10" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <h1>Teach</h1>
    <span class="badge">EDU</span>
  </div>

  <!-- Login overlay (shown if SSO fails) -->
  <div id="loginOverlay">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
      <rect width="24" height="24" rx="4" fill="#6264a7"/>
      <path d="M7 8h10M7 12h7M7 16h10" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <h2>Sign in to Teach</h2>
    <p>Use your EDU Microsoft account to access Copilot Teach tools.</p>
    <button class="login-btn primary" id="ssoBtn">Sign in with Microsoft</button>
    <span class="login-divider">— or enter your EDU email —</span>
    <input type="email" id="emailInput" placeholder="name@school.edu"/>
    <button class="login-btn secondary" id="emailBtn">Continue</button>
    <div class="user-info" id="userInfo" style="display:none"></div>
  </div>

  <!-- Copilot Teach iframe -->
  <iframe id="teachFrame"
          src="about:blank"
          title="M365 Copilot Teach"
          allow="clipboard-write"
          sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation">
  </iframe>

  <!-- Bottom action bar -->
  <div class="bottom-bar">
    <button class="primary" id="insertBtn" title="Insert generated content into the OneNote page">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 1a.5.5 0 0 1 .5.5V7h5.5a.5.5 0 0 1 0 1H8.5v5.5a.5.5 0 0 1-1 0V8H2a.5.5 0 0 1 0-1h5.5V1.5A.5.5 0 0 1 8 1z"/>
      </svg>
      Insert to Page
    </button>
    <button id="embedBtn" title="Embed content as oEmbed rich card">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M5.854 4.854a.5.5 0 1 0-.708-.708l-3.5 3.5a.5.5 0 0 0 0 .708l3.5 3.5a.5.5 0 0 0 .708-.708L2.707 8l3.147-3.146zm4.292 0a.5.5 0 0 1 .708-.708l3.5 3.5a.5.5 0 0 1 0 .708l-3.5 3.5a.5.5 0 0 1-.708-.708L13.293 8l-3.147-3.146z"/>
      </svg>
      Embed
    </button>
    <button id="refreshBtn" title="Reload Copilot Teach">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 1 1 .908-.418A6 6 0 1 1 8 2v1z"/>
        <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
      </svg>
    </button>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- All JS inlined — no external files needed -->
  <script>
  /* ============================================================
     Teach – M365 Copilot OneNote Add-in  (EDU)
     Fully self-contained — no localhost required
     ============================================================ */

  var TEACH_URL      = 'https://copilot.cloud.microsoft/teach';
  var TEACH_FALLBACK = 'https://copilot.microsoft.com/?fromEducation=true';

  var currentUser = null;
  var officeReady = false;

  // ── Bootstrap ──────────────────────────────────────────
  Office.onReady(function(info) {
    officeReady = true;
    console.log('[Teach] Office ready – host:', info.host);
    trySSO();
    wireButtons();
  });

  // ── SSO: try to pass through the signed-in user ───────
  async function trySSO() {
    try {
      var token = await Office.auth.getAccessTokenAsync({
        allowSignInPrompt: false,
        allowConsentPrompt: false,
        forMSGraphAccess: true
      });

      if (token && typeof token === 'string' && token.length > 10) {
        var payload = JSON.parse(atob(token.split('.')[1]));
        currentUser = {
          name:  payload.name || payload.preferred_username || 'Educator',
          email: payload.preferred_username || payload.upn || ''
        };
        console.log('[Teach] SSO success:', currentUser.email);
        loginSuccess(currentUser);
        return;
      }
    } catch (err) {
      console.warn('[Teach] SSO unavailable, showing login:', err.message || err);
    }
    showLoginOverlay();
  }

  // ── Login overlay ─────────────────────────────────────
  function showLoginOverlay() {
    document.getElementById('loginOverlay').classList.remove('hidden');
  }
  function hideLoginOverlay() {
    document.getElementById('loginOverlay').classList.add('hidden');
  }

  // ── Login success → load Teach ────────────────────────
  function loginSuccess(user) {
    currentUser = user;
    hideLoginOverlay();

    var url = TEACH_URL;
    if (user.email) {
      var hint = encodeURIComponent(user.email);
      url += (url.includes('?') ? '&' : '?') + 'login_hint=' + hint;
    }
    loadTeach(url);
  }

  // ── Load Copilot Teach in the iframe ──────────────────
  function loadTeach(url) {
    var frame = document.getElementById('teachFrame');
    frame.src = url || TEACH_URL;
    frame.onerror = function() {
      console.warn('[Teach] Primary URL blocked, trying fallback');
      frame.src = TEACH_FALLBACK;
    };
  }

  // ── Wire up buttons ──────────────────────────────────
  function wireButtons() {
    // SSO button
    document.getElementById('ssoBtn').addEventListener('click', async function() {
      try {
        var token = await Office.auth.getAccessTokenAsync({
          allowSignInPrompt: true,
          allowConsentPrompt: true,
          forMSGraphAccess: true
        });
        var payload = JSON.parse(atob(token.split('.')[1]));
        loginSuccess({
          name:  payload.name || payload.preferred_username,
          email: payload.preferred_username || payload.upn || ''
        });
      } catch (err) {
        toast('SSO not available — please enter your EDU email below.', 'error');
      }
    });

    // Email login
    document.getElementById('emailBtn').addEventListener('click', function() {
      var email = document.getElementById('emailInput').value.trim();
      if (!email || !email.includes('@')) {
        toast('Enter a valid EDU email address.', 'error');
        return;
      }
      loginSuccess({ name: email.split('@')[0], email: email });
    });

    // Insert to Page
    document.getElementById('insertBtn').addEventListener('click', insertToPage);

    // oEmbed
    document.getElementById('embedBtn').addEventListener('click', embedToPage);

    // Refresh
    document.getElementById('refreshBtn').addEventListener('click', function() {
      var frame = document.getElementById('teachFrame');
      if (frame.src && frame.src !== 'about:blank') {
        frame.src = frame.src;
        toast('Reloaded Copilot Teach.', 'success');
      }
    });
  }

  // ── Insert content into OneNote page ──────────────────
  async function insertToPage() {
    if (!officeReady) { toast('OneNote is not ready.', 'error'); return; }
    var html = extractFrameContent();
    try {
      await OneNote.run(async function(ctx) {
        var page    = ctx.application.getActivePage();
        var outline = page.addOutline(40, 40, html);
        await ctx.sync();
      });
      toast('Content inserted into page!', 'success');
    } catch (err) {
      console.error('[Teach] Insert error:', err);
      toast('Could not insert — ' + (err.message || err), 'error');
    }
  }

  // ── Embed via oEmbed card ─────────────────────────────
  async function embedToPage() {
    if (!officeReady) { toast('OneNote is not ready.', 'error'); return; }
    var frame    = document.getElementById('teachFrame');
    var embedUrl = frame.src || TEACH_URL;
    var oembedHtml = buildOEmbedCard(embedUrl);
    try {
      await OneNote.run(async function(ctx) {
        var page    = ctx.application.getActivePage();
        var outline = page.addOutline(40, 40, oembedHtml);
        await ctx.sync();
      });
      toast('Embedded content added to page!', 'success');
    } catch (err) {
      console.error('[Teach] Embed error:', err);
      toast('Could not embed — ' + (err.message || err), 'error');
    }
  }

  // ── Build an oEmbed-style rich card ───────────────────
  function buildOEmbedCard(url) {
    var ts   = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    var user = currentUser ? currentUser.name : 'Teacher';
    return '<div style="border:1px solid #d1d1d1; border-radius:8px; padding:16px; max-width:560px; font-family:Segoe UI,sans-serif;">'
      + '<div style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">'
      + '<div style="width:32px;height:32px;border-radius:4px;background:#6264a7;display:flex;align-items:center;justify-content:center;">'
      + '<span style="color:#fff;font-weight:700;font-size:14px;">T</span></div>'
      + '<div><div style="font-weight:600;font-size:14px;">M365 Copilot Teach</div>'
      + '<div style="font-size:11px;color:#616161;">Created by ' + user + ' &middot; ' + ts + '</div></div></div>'
      + '<div style="background:#f5f5f5;border-radius:4px;padding:12px;margin-bottom:12px;">'
      + '<div style="font-weight:600;margin-bottom:4px;">&#128218; Teaching Content</div>'
      + '<div style="font-size:13px;color:#424242;">This content was generated with M365 Copilot Teach for Education. Open the link below to view or edit in Copilot.</div></div>'
      + '<a href="' + url + '" style="color:#6264a7;font-size:13px;font-weight:600;text-decoration:none;">&#128279; Open in Copilot Teach &rarr;</a></div>';
  }

  // ── Try to read iframe content ────────────────────────
  function extractFrameContent() {
    try {
      var frame = document.getElementById('teachFrame');
      if (frame && frame.contentDocument && frame.contentDocument.body) {
        var sel = frame.contentWindow.getSelection();
        if (sel && sel.toString().trim().length > 0) {
          var range = sel.getRangeAt(0);
          var div   = document.createElement('div');
          div.appendChild(range.cloneContents());
          return div.innerHTML;
        }
        return frame.contentDocument.body.innerHTML;
      }
    } catch (e) { /* cross-origin – expected */ }

    // Fallback: rich HTML template
    var user = currentUser ? currentUser.name : 'Teacher';
    var ts   = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    return '<div style="font-family:Segoe UI,sans-serif; max-width:600px;">'
      + '<h2 style="color:#6264a7; margin-bottom:4px;">&#127891; Lesson Plan – Copilot Teach</h2>'
      + '<p style="font-size:12px; color:#888;">Created by ' + user + ' on ' + ts + '</p>'
      + '<hr style="border:none;border-top:1px solid #e0e0e0;margin:12px 0;"/>'
      + '<h3>Subject &amp; Topic</h3>'
      + '<p><em>[Edit this section in OneNote]</em></p>'
      + '<h3>Learning Objectives</h3>'
      + '<ul><li>Students will be able to&hellip;</li><li>Students will understand&hellip;</li><li>Students will demonstrate&hellip;</li></ul>'
      + '<h3>Lesson Flow</h3>'
      + '<ol><li><strong>Hook</strong> (5 min) – Engage curiosity</li>'
      + '<li><strong>Instruction</strong> (15 min) – Deliver content</li>'
      + '<li><strong>Practice</strong> (15 min) – Guided &amp; independent</li>'
      + '<li><strong>Closure</strong> (5 min) – Reflect &amp; assess</li></ol>'
      + '<h3>Assessment</h3>'
      + '<p>Formative: <em>[method]</em> &middot; Summative: <em>[method]</em></p>'
      + '<h3>Differentiation</h3>'
      + '<table style="border-collapse:collapse;width:100%;font-size:13px;">'
      + '<tr style="background:#f5f5f5;"><th style="text-align:left;padding:6px;border:1px solid #e0e0e0;">Learner Group</th><th style="text-align:left;padding:6px;border:1px solid #e0e0e0;">Strategy</th></tr>'
      + '<tr><td style="padding:6px;border:1px solid #e0e0e0;">Advanced</td><td style="padding:6px;border:1px solid #e0e0e0;"><em>[enrichment]</em></td></tr>'
      + '<tr><td style="padding:6px;border:1px solid #e0e0e0;">Struggling</td><td style="padding:6px;border:1px solid #e0e0e0;"><em>[scaffolding]</em></td></tr>'
      + '<tr><td style="padding:6px;border:1px solid #e0e0e0;">ELL</td><td style="padding:6px;border:1px solid #e0e0e0;"><em>[language support]</em></td></tr>'
      + '</table></div>';
  }

  // ── Toast helper ──────────────────────────────────────
  function toast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'toast ' + type + ' show';
    clearTimeout(el._t);
    el._t = setTimeout(function() { el.classList.remove('show'); }, 4000);
  }
  </script>
</body>
</html>
